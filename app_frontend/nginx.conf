server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/wasm;

    # All routes fall back to index.html for Flutter's client-side router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache immutable build artifacts aggressively
    location ~* \.(js|wasm|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
