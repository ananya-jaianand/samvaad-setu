name: samvaad_setu_app
description: "A beautiful, GSAP-animated Flutter app frontend for Samvaad-Setu."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  web_socket_channel: ^3.0.3
  flutter_animate: ^4.5.0
  record: ^5.1.0
  record_web: ^1.1.0
  audioplayers: ^6.0.0
  lucide_icons: ^0.257.0
  fl_chart: ^0.69.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
