<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samvaad-Setu Auto-Tickets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .priority-high { border-left: 4px solid #ef4444; }
        .priority-normal { border-left: 4px solid #f59e0b; }
        .priority-low { border-left: 4px solid #3b82f6; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">
    <nav class="bg-blue-800 text-white p-4 shadow-md flex justify-between items-center">
        <div class="flex items-center gap-3">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            <h1 class="text-2xl font-bold">1092 Verified Grievances</h1>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="simulateCall()" id="simBtn" class="bg-green-600 hover:bg-green-700 px-4 py-2 rounded text-sm font-semibold shadow transition flex items-center gap-2">
                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                Simulate Call
            </button>
            <button onclick="fetchTickets()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-sm transition">Refresh</button>
        </div>
    </nav>
    
    <div class="max-w-5xl mx-auto p-6">
        <div id="loader" class="text-center py-10 text-gray-500">Loading tickets...</div>
        <div id="empty-state" class="hidden text-center py-20">
            <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            <h3 class="mt-2 text-sm font-medium text-gray-900">No tickets generated</h3>
            <p class="mt-1 text-sm text-gray-500">Simulate a call and successfully verify the intent to see Auto-Tickets appear here!</p>
        </div>
        
        <div id="tickets-container" class="grid gap-6">
            <!-- Tickets injected here -->
        </div>
    </div>

    <script>
        async function fetchTickets() {
            const loader = document.getElementById('loader');
            const emptyState = document.getElementById('empty-state');
            const container = document.getElementById('tickets-container');
            
            try {
                const res = await fetch('/api/tickets');
                const tickets = await res.json();
                
                loader.classList.add('hidden');
                container.innerHTML = '';
                
                if (tickets.length === 0) {
                    emptyState.classList.remove('hidden');
                    return;
                }
                
                emptyState.classList.add('hidden');
                
                tickets.forEach(ticket => {
                    const priorityClass = `priority-${ticket.priority}`;
                    const badgeColor = ticket.priority === 'high' ? 'bg-red-100 text-red-800' : 
                                       (ticket.priority === 'normal' ? 'bg-yellow-100 text-yellow-800' : 'bg-blue-100 text-blue-800');
                    
                    const date = new Date(ticket.created_at).toLocaleString();
                    
                    const html = `
                        <div class="bg-white rounded-lg shadow p-6 ${priorityClass} hover:shadow-lg transition">
                            <div class="flex justify-between items-start border-b pb-4 mb-4">
                                <div>
                                    <div class="flex items-center gap-3">
                                        <h2 class="text-lg font-bold text-gray-900">${ticket.ticket_id}</h2>
                                        <span class="px-2.5 py-0.5 rounded-full text-xs font-medium ${badgeColor} capitalize">${ticket.priority} Priority</span>
                                    </div>
                                    <p class="text-sm text-gray-500 mt-1">${date}</p>
                                </div>
                                <div class="text-right">
                                    <span class="inline-flex items-center rounded-md bg-green-50 px-2 py-1 text-xs font-medium text-green-700 ring-1 ring-inset ring-green-600/20">${ticket.status}</span>
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                <div>
                                    <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Category</p>
                                    <p class="text-sm font-medium text-gray-900">${ticket.category} ${ticket.sub_category ? `> ${ticket.sub_category}` : ''}</p>
                                </div>
                                <div>
                                    <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Location</p>
                                    <p class="text-sm font-medium text-gray-900">${ticket.location}</p>
                                </div>
                            </div>
                            
                            <div class="mb-4 bg-gray-50 p-4 rounded text-sm text-gray-800 italic">
                                "${ticket.description}"
                            </div>
                            
                            <div class="flex items-center gap-2 text-sm text-gray-500">
                                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                                Routing to: <strong>${ticket.suggested_department}</strong>
                            </div>
                        </div>
                    `;
                    container.innerHTML += html;
                });
            } catch (err) {
                console.error("Failed to load tickets", err);
                loader.innerHTML = "Failed to connect to server.";
            }
        }
        
        async function simulateCall() {
            const btn = document.getElementById('simBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<svg class="animate-spin h-4 w-4 mr-2" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Simulating...';
            btn.disabled = true;

            try {
                // 1. Create Session
                const res = await fetch('/sessions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ district: 'bengaluru_urban', language: 'en' })
                });
                const session = await res.json();
                const sessionId = session.session_id;

                // 2. Connect WebSocket
                const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const ws = new WebSocket(`${wsProtocol}//${window.location.host}/ws/${sessionId}`);

                ws.onopen = () => {
                    console.log('Connected to WS');
                    // 3. Send fake audio (base64 of "I have no water")
                    ws.send(JSON.stringify({
                        type: 'audio',
                        data: 'UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=', // dummy minimal wav
                        language: 'en',
                        district: 'bengaluru_urban'
                    }));

                    // 4. Wait 1.5 seconds, then send verification
                    setTimeout(() => {
                        ws.send(JSON.stringify({
                            type: 'verification',
                            data: 'yes, that is correct'
                        }));
                    }, 1500);
                    
                    // 5. Wait 3 seconds for Gemini to generate ticket, then close and refresh
                    setTimeout(() => {
                        ws.close();
                        fetchTickets();
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                    }, 4500);
                };

            } catch (e) {
                alert("Simulation failed. Make sure backend is running.");
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
        
        // Load on start
        fetchTickets();
        
        // Auto-refresh every 5 seconds
        setInterval(fetchTickets, 5000);
    </script>
</body>
</html>
